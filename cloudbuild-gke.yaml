steps:
  # Step 1: Clone the repository
  - name: 'gcr.io/cloud-builders/git'
    args: ['clone', 'https://github.com/oil78/repo-5.git']

  # Step 2: Build the image (Notice the 'dir' parameter pointing to the cloned folder)
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'repo-5'
    args: ['build', '-t', 'gcr.io/${_PROJECT_ID}/${_CINAME}:${_VERSION}', '.']

  # Step 3: Push the image (Removed the trailing '.')
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${_PROJECT_ID}/${_CINAME}:${_VERSION}']

# kubectl set image deployment/cicdapp-1 nginx-1=gcr.io/${_PROJECT_ID}/${_CINAME}:${_VERSION}
# Step 4: Update the GKE deployment image
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/cicdapp-1'
      - 'nginx-1=gcr.io/${_PROJECT_ID}/${_CINAME}:${_VERSION}'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=europe-west1-b'
      - 'CLOUDSDK_CONTAINER_CLUSTER=cicd-cluster'
   

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PROJECT_ID: 'kubernetestest-494210'
  _CINAME: 'gke-image'
  _VERSION: 'v1.0'
